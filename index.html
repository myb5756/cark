<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Şans Çarkı</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap');
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #020617;
            background-image: radial-gradient(circle at top, #0f172a 0%, #020617 70%);
            color: white; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; position: relative;
        }
        .laser-grid {
            position: absolute; bottom: -30%; left: -50%; width: 200%; height: 150%;
            background:
                repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(56, 189, 248, 0.05) 52px, rgba(14, 165, 233, 0.2) 55px, rgba(56, 189, 248, 0.05) 58px, transparent 60px),
                repeating-linear-gradient(-45deg, transparent, transparent 50px, rgba(56, 189, 248, 0.05) 52px, rgba(14, 165, 233, 0.2) 55px, rgba(56, 189, 248, 0.05) 58px, transparent 60px);
            -webkit-mask-image: radial-gradient(ellipse at bottom, black 0%, transparent 70%);
            mask-image: radial-gradient(ellipse at bottom, black 0%, transparent 70%); z-index: 0;
        }
        .wheel-cabinet {
            position: relative; width: 350px; height: 350px;
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 25%, #64748b 50%, #94a3b8 75%, #f1f5f9 100%);
            border-radius: 50%; padding: 14px;
            box-shadow: 0 15px 40px rgba(14, 165, 233, 0.3), inset 0 0 20px rgba(0,0,0,0.8); z-index: 10;
        }
        .wheel-cabinet::before {
            content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
            border-radius: 50%; border: 4px dotted rgba(224, 242, 254, 0.8);
            pointer-events: none; z-index: 5; filter: drop-shadow(0 0 8px #0ea5e9);
        }
        .pointer-wrapper {
            position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 20;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.7));
        }
        .pointer-circle {
            width: 26px; height: 26px; background: radial-gradient(circle, #e0f2fe 0%, #38bdf8 50%, #0284c7 100%);
            border-radius: 50%; border: 2px solid #0f172a; margin-bottom: -6px; z-index: 2;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }
        .pointer-triangle {
            width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent;
            border-top: 38px solid #38bdf8; position: relative;
        }
        .pointer-triangle::after {
            content: ''; position: absolute; top: -38px; left: -8px;
            border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 26px solid #0284c7;
        }
        .wheel-container {
            width: 100%; height: 100%; border-radius: 50%; background: #020617;
            overflow: hidden; box-shadow: 0 0 25px rgba(0,0,0,0.9) inset;
        }
        canvas {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 6s cubic-bezier(0.17, 0.67, 0.12, 0.99); transform: rotate(0deg);
        }
        .center-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75px; height: 75px; background: #0f172a; border-radius: 50%;
            border: 3px solid #38bdf8;
            box-shadow: 0 0 15px #38bdf8, 0 0 30px #0ea5e9, inset 0 0 15px rgba(14,165,233,0.2);
            z-index: 15; display: flex; align-items: center; justify-content: center;
        }
        .neon-text {
            font-size: 11px; font-weight: 900; color: #e0f2fe; text-align: center; line-height: 1.3;
            text-shadow: 0 0 8px #38bdf8, 0 0 20px #0ea5e9, 0 0 40px #0284c7;
            letter-spacing: 1px;
        }
        .spin-btn {
            margin-top: 45px; padding: 16px 50px; font-size: 20px; font-family: 'Montserrat', sans-serif;
            font-weight: 900; color: #ffffff; background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border: 2px solid #7dd3fc; border-radius: 50px;
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4), inset 0 2px 5px rgba(255, 255, 255, 0.3);
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: transform 0.1s, box-shadow 0.1s; z-index: 10;
        }
        .spin-btn:active { transform: scale(0.95); box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); }
        .spin-btn:disabled { background: #334155; border-color: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .footer-text { margin-top: 12px; font-size: 15px; color: #e2e8f0; font-weight: bold; z-index: 10; text-shadow: 0 2px 5px rgba(0,0,0,1); text-align: center; }
        .sonuc-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
            text-align: center; padding: 30px; backdrop-filter: blur(5px);
        }
        .sonuc-overlay.show { opacity: 1; pointer-events: auto; }
        .sonuc-title { font-size: 40px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
        .sonuc-desc { font-size: 18px; color: #e0f2fe; line-height: 1.5; font-weight: bold; }
        .sonuc-win { color: #4ade80; text-shadow: 0 0 25px rgba(74, 222, 128, 0.6); }
        .sonuc-lose { color: #f87171; text-shadow: 0 0 25px rgba(248, 113, 113, 0.6); }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: none; } 40% { color: white; } 60% { text-shadow: 2px 0 white; } 80%, 100% { text-shadow: 2px 0 white, 4px 0 white; } }
    </style>
</head>
<body>
    <div class="laser-grid"></div>
    
    <div class="wheel-cabinet">
        <div class="pointer-wrapper">
            <div class="pointer-circle"></div>
            <div class="pointer-triangle"></div>
        </div>
        <div class="wheel-container">
            <canvas id="wheel"></canvas>
        </div>
        <div class="center-core"><span class="neon-text">BONUS<br>SEMTİ</span></div>
    </div>
    
    <button id="spinBtn" class="spin-btn">ÇARKI DÖNDÜR</button>

    <div class="footer-text">#BonusSemtiKazandırır</div>

    <div id="sonucOverlay" class="sonuc-overlay">
        <div id="sonucTitle" class="sonuc-title"></div>
        <div id="sonucDesc" class="sonuc-desc"></div>
        <div style="margin-top: 30px; color: #64748b; font-size: 14px;">
            Telegram'a yönlendiriliyorsunuz<span class="loading-dots"></span>
        </div>
    </div>

    <script>
        const NGROK_URL = "https://bufing-factors-membrane-checklist.trycloudflare.com";

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#020617");
        tg.ready();

        function getUserId() {
            try {
                const u = tg.initDataUnsafe?.user;
                if (u && u.id) return u.id;
                // initData'dan manuel parse
                const params = new URLSearchParams(tg.initData);
                const userStr = params.get('user');
                if (userStr) {
                    const parsed = JSON.parse(decodeURIComponent(userStr));
                    if (parsed && parsed.id) return parsed.id;
                }
            } catch(e) { console.error("getUserId hatası:", e); }
            return 0;
        }

        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const size = 320;
        const scale = window.devicePixelRatio || 2;
        canvas.width = size * scale;
        canvas.height = size * scale;
        ctx.scale(scale, scale);

        const sectors = [
            { label: "LOSE",                   weight: 30, bg: "#0f172a", text: "#38bdf8" },
            { label: "1 TL BET\n150 FREESPIN", weight: 5,  bg: "#f1f5f9", text: "#0f172a" },
            { label: "1 TL BET\n25 FREESPIN",  weight: 15, bg: "#0f172a", text: "#38bdf8" },
            { label: "10.000 TL\nNAKİT",       weight: 1,  bg: "#f1f5f9", text: "#0f172a" },
            { label: "LOSE",                   weight: 20, bg: "#0f172a", text: "#38bdf8" },
            { label: "2 TL BET\n100 FREESPIN", weight: 5,  bg: "#f1f5f9", text: "#0f172a" },
            { label: "LOSE",                   weight: 20, bg: "#0f172a", text: "#38bdf8" },
            { label: "1.000 TL\nNAKİT",        weight: 2,  bg: "#f1f5f9", text: "#0f172a" },
            { label: "250 TL\nNAKİT",          weight: 5,  bg: "#0f172a", text: "#38bdf8" },
            { label: "2 TL BET\n150 FREESPIN", weight: 3,  bg: "#f1f5f9", text: "#0f172a" },
            { label: "1 TL BET\n100 FREESPIN", weight: 10, bg: "#0f172a", text: "#38bdf8" },
            { label: "2.500 TL\nNAKİT",        weight: 2,  bg: "#f1f5f9", text: "#0f172a" }
        ];

        const totalSectors = sectors.length;
        const arc = (2 * Math.PI) / totalSectors;
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = centerX;

        function drawWheel() {
            sectors.forEach((sector, i) => {
                const angle = i * arc - Math.PI / 2;
                ctx.beginPath();
                ctx.fillStyle = sector.bg;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                ctx.strokeStyle = "rgba(148, 163, 184, 0.3)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = sector.text;
                ctx.font = "bold 13px 'Montserrat'";
                const lines = sector.label.split('\n');
                lines.forEach((line, j) => {
                    const yPos = (j * 15) - ((lines.length - 1) * 7.5);
                    ctx.fillText(line, radius - 25, yPos + 4);
                });
                ctx.restore();
            });
        }
        drawWheel();

        function findSectorIndex(odul) {
            const normalized = odul.replace(/ /g, '\n');
            for (let i = 0; i < sectors.length; i++) {
                if (sectors[i].label === normalized || sectors[i].label === odul) return i;
            }
            if (odul === "LOSE") {
                const loseIndexes = sectors.map((s, i) => s.label === "LOSE" ? i : -1).filter(i => i !== -1);
                return loseIndexes[Math.floor(Math.random() * loseIndexes.length)];
            }
            return 0;
        }

        let currentRotation = 0;

        spinBtn.addEventListener("click", async () => {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            spinBtn.disabled = true;
            spinBtn.innerText = "BEKLENİYOR...";

            const userId = getUserId();
            console.log("userId:", userId, "initData:", tg.initData, "initDataUnsafe:", tg.initDataUnsafe);

            let serverOdul = null;
            let serverKazandi = false;
            let serverKod = "";

            try {
                const res = await fetch(`${NGROK_URL}/spin_start`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "true"
                    },
                    body: JSON.stringify({ user_id: userId })
                });

                if (res.status === 429) {
                    alert("Zaten çarkını çevirdin! Bekleme süresi dolmadan tekrar çeviremezsin.");
                    spinBtn.disabled = false;
                    spinBtn.innerText = "ÇARKI DÖNDÜR";
                    return;
                }

                if (!res.ok) {
                    alert("Sunucu hatası, lütfen tekrar dene.");
                    spinBtn.disabled = false;
                    spinBtn.innerText = "ÇARKI DÖNDÜR";
                    return;
                }

                const data = await res.json();
                serverOdul   = data.odul;
                serverKazandi = data.kazandi;
                serverKod    = data.kod || "";

            } catch (e) {
                alert("Bağlantı hatası, lütfen tekrar dene.");
                spinBtn.disabled = false;
                spinBtn.innerText = "ÇARKI DÖNDÜR";
                return;
            }

            spinBtn.innerText = "DÖNÜYOR...";

            const winIndex = findSectorIndex(serverOdul);
            const sliceAngle = 360 / totalSectors;
            const targetAngle = (winIndex * sliceAngle) + (sliceAngle / 2);
            const spins = 12 * 360;
            const currentMod = currentRotation % 360;
            const randomOffset = (Math.random() * (sliceAngle - 4)) - ((sliceAngle - 4) / 2);
            currentRotation = currentRotation + spins + targetAngle - currentMod + randomOffset;

            canvas.style.transition = "transform 6s cubic-bezier(0.17, 0.67, 0.12, 0.99)";
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const overlay = document.getElementById("sonucOverlay");
                const title   = document.getElementById("sonucTitle");
                const desc    = document.getElementById("sonucDesc");

                if (!serverKazandi) {
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    title.className = "sonuc-title sonuc-lose";
                    title.innerText = "MAALESEF 😔";
                    desc.innerText  = "Üzgünüm, bir şey kazanamadın.\nBir dahaki sefere!";
                } else {
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    title.className = "sonuc-title sonuc-win";
                    title.innerText = "TEBRİKLER! 🎉";
                    desc.innerHTML  = `Kazandığın Ödül:<br><span style="color:#fff; font-size:22px;">${serverOdul}</span><br><br>Oyun kodun bot üzerinden sana mesaj olarak gönderiliyor...`;
                }

                overlay.classList.add("show");

                setTimeout(() => {
                    tg.sendData(JSON.stringify({
                        durum: serverKazandi ? "kazandi" : "kaybetti",
                        odul:  serverOdul,
                        kod:   serverKod
                    }));
                }, 3500);

            }, 6000);
        });
    </script>
</body>
</html>
